{% load static %}
{% with n=request.resolver_match.url_name %}
<aside class="admin-sidebar" id="admin-sidebar" aria-label="Admin navigation">
  <div class="admin-sidebar__brand">
    <a href="{% url 'admin_dashboard' %}" class="admin-sidebar__logo-link">
      <img src="{% static 'img/logo.jpeg' %}" alt="AaramKart" width="64" height="22" class="admin-sidebar__logo-img" />
    </a>
  </div>

  <nav class="admin-sidebar__nav">
    <a href="{% url 'admin_dashboard' %}" class="admin-sidebar__link {% if n == 'admin_dashboard' %}is-active{% endif %}">
      <span class="admin-sidebar__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
      </span>
      <span class="admin-sidebar__label">Dashboard</span>
    </a>

    <a href="{% url 'admin_products' %}" class="admin-sidebar__link {% if n == 'admin_products' or n == 'admin_product_add' or n == 'admin_product_edit' or n == 'admin_product_delete' or n == 'admin_bulk_import_products' %}is-active{% endif %}">
      <span class="admin-sidebar__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </span>
      <span class="admin-sidebar__label">Inventory &amp; stock</span>
    </a>

    <a href="{% url 'admin_orders' %}" class="admin-sidebar__link {% if n == 'admin_orders' or n == 'admin_order_detail' %}is-active{% endif %}">
      <span class="admin-sidebar__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 12h6"/><path d="M9 16h6"/></svg>
      </span>
      <span class="admin-sidebar__label">Orders</span>
    </a>

    <a href="{% url 'admin_offline_order' %}" class="admin-sidebar__link {% if n == 'admin_offline_order' %}is-active{% endif %}">
      <span class="admin-sidebar__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      </span>
      <span class="admin-sidebar__label">Create Offline Order</span>
    </a>

    <a href="{% url 'admin_customer_details' %}" class="admin-sidebar__link {% if n == 'admin_customer_details' or n == 'admin_customer_order_history' %}is-active{% endif %}">
      <span class="admin-sidebar__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </span>
      <span class="admin-sidebar__label">Customers details</span>
    </a>

    <a href="{% url 'admin:index' %}" class="admin-sidebar__link admin-sidebar__link--external" target="_blank" rel="noopener noreferrer">
      <span class="admin-sidebar__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </span>
      <span class="admin-sidebar__label">Django Admin</span>
      <span class="admin-sidebar__external" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </span>
    </a>
  </nav>
</aside>
{% endwith %}
