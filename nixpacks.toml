# Nixpacks (Railway): libpq for Postgres drivers; explicit gunicorn start with migrate.
[phases.setup]
aptPkgs = ["libpq5"]

[start]
cmd = "sh -c 'python manage.py migrate --noinput && exec gunicorn aaramkart.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 2 --threads 4 --graceful-timeout 30 --timeout 120'"
